# --- External Sources ---
pool 0.pool.ntp.org iburst
pool 1.pool.ntp.org iburst
pool time.cloudflare.com iburst

# --- Access Control (UniFi & Local) ---
allow 127.0.0.0/8
allow 10.0.0.0/8
allow 172.16.0.0/12
allow 192.168.0.0/16

# --- Resilience & No-Battery Logic ---
# Jump the clock immediately if we reboot and time is wrong
makestep 0.1 10

# Serve time even if internet is down (Stratum 10)
local stratum 10

# Save drift and measurement data to disk for better offline accuracy
dumponexit
dumpdir /var/lib/chrony
driftfile /var/lib/chrony/chrony.drift

# --- Logging ---
log tracking measurements statistics
logdir /var/log/chrony
